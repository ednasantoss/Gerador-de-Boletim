<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Gerador de Boletim</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>Gerador de Boletim</h1>

    <form id="form-boletim">
      <div class="form-group">
        <label>Nome do aluno</label>
        <input type="text" id="nome" placeholder="Digite o nome">
      </div>

      <div class="form-group">
        <label>Nota 1</label>
        <input type="number" id="nota1" step="0.1">
      </div>

      <div class="form-group">
        <label>Nota 2</label>
        <input type="number" id="nota2" step="0.1">
      </div>

      <div class="form-group">
        <label>Nota 3</label>
        <input type="number" id="nota3" step="0.1">
      </div>

      <button type="submit">Gerar Boletim</button>
    </form>

    <div id="resultado" class="hidden">
      <h2>Resultado</h2>
      <p><strong>Aluno:</strong> <span id="res-nome"></span></p>
      <p><strong>Média:</strong> <span id="res-media"></span></p>
      <p><strong>Status:</strong> <span id="res-status"></span></p>
    </div>
  </div>

  <section id="notas">
    <div class="Registros">
      <h1 class="h1">Boletim de Alunos</h1>
      <table class="tabelaBoletim" id="tabela-boletim">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Nota1</th>
            <th>Nota2</th>
            <th>Nota3</th>
            <th>Média</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tabela-alunos">
        </tbody>
      </table>
    </div>
  </section>

  <script src="script.js"></script>
</body>

</html>
